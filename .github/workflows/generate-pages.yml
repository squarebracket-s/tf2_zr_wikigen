on:
  push:
    branches:
    - page_gen
  workflow_dispatch:

jobs:
  generate_wiki:
    name: generate-pages
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Setup venv
      run: python -m venv venv; ./venv/bin/pip install -r requirements.txt
    
    - name: Clone ZR repo
      run: git clone https://github.com/artvin01/TF2-Zombie-Riot

    - name: Parse ZR repo code
      run: ./venv/bin/python main.py
    
    - name: Move repo_img and builtin_img to wiki
      run: |
        mv repo_img/ ./gh-pages/repo_img/
        mv builtin_img/ ./gh-pages/builtin_img/
        mv premedia_icons/ ./gh-pages/premedia_icons/

    - name: Push to gh-pages
      run: |
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        cd gh-pages
        git init -b gh-pages # -b redundant?
        git add .
        git commit -m "Generate Pages [ https://github.com/squarebracket-s/tf2_zr_wikigen/commit/$GITHUB_SHA ]"
        git remote add origin https://x-access-token:${{ secrets.WIKI_PAT }}@github.com/squarebracket-s/tf2_zr_wikigen.git
        git push origin gh-pages --force
