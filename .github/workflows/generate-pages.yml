on:
  push:
    branches:
    - page_gen
  workflow_dispatch:

permissions:
  pages: write
  id-token: write 

jobs:
  generate_wiki:
    name: generate-pages
    runs-on: ubuntu-latest
    steps:
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Setup venv
      run: python -m venv venv; ./venv/bin/pip install -r requirements.txt
    
    - name: Clone ZR repo
      run: git clone https://github.com/artvin01/TF2-Zombie-Riot

    - name: Parse ZR repo code
      run: ./venv/bin/python main.py
    
    - name: Move repo_img and builtin_img to wiki
      run: |
        mv repo_img/ ./gh-pages/repo_img/
        mv builtin_img/ ./gh-pages/builtin_img/
        mv premedia_icons/ ./gh-pages/premedia_icons/
    
    - name: Upload static files as artifact
      id: deployment
      uses: actions/upload-pages-artifact@v4 # or specific "vX.X.X" version tag for this action
      with:
        path: gh-pages/

  deploy:
    name: generate-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # or specific "vX.X.X" version tag for this action